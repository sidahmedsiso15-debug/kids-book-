*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden}

.start-btn{background:var(--yellow);color:#333;border:none;padding:18px 48px;font-size:1.4rem;font-weight:800;border-radius:50px;cursor:pointer;font-family:'Fredoka One',cursive;box-shadow:0 8px 0 #e0a800;transition:all 0.15s}
.start-btn:hover{transform:translateY(3px);box-shadow:0 5px 0 #e0a800}
#book{display:none}
.page{display:none;min-height:100vh;padding:20px}
.page.active{display:block}
.nav-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;background:white;border-radius:20px;padding:12px 20px;box-shadow:var(--card-shadow);position:sticky;top:10px;z-index:100}
.nav-btn{background:var(--blue);color:white;border:none;width:44px;height:44px;border-radius:50%;font-size:1.3rem;cursor:pointer;transition:transform 0.2s;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{transform:scale(1.1)}
.nav-btn:disabled{background:#ccc;cursor:default}
.home-btn{background:var(--orange);color:white;border:none;padding:10px 18px;border-radius:50px;font-weight:800;cursor:pointer;font-size:0.95rem}

.alpha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:16px;max-width:900px;margin:0 auto}

.alpha-emoji{font-size:2rem;display:block;margin-bottom:4px}
.alpha-word{font-size:0.85rem;font-weight:700;color:#555}
.numbers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:20px;max-width:900px;margin:0 auto}

.number-dots{font-size:1.4rem;letter-spacing:3px;display:block;min-height:1.8rem;margin-bottom:8px}
.number-word{font-weight:800;font-size:1rem;color:#444}
.shapes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px;max-width:900px;margin:0 auto}

.shape-svg{width:80px;height:80px;margin:0 auto 12px;display:block}
.shape-name{font-family:'Fredoka One',cursive;font-size:1.3rem;color:#333}
.colors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;max-width:900px;margin:0 auto}

.color-name{font-family:'Fredoka One',cursive;font-size:1.5rem}
